<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
<title>Js 3D Studio | Catálogo Oficial</title>

<style>
html {
    background: #0b0b0f;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0f;
    color: #e4e4e4;
    padding-bottom: 120px; /* espaço para o footer fixo */
}

/* HEADER COM GRADIENTE ROXO */
header {
    background: linear-gradient(90deg, #2a0845, #6441a5, #7f00ff);
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
}

.card {
    background: #0f0f18;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(127, 0, 255, 0.2);
}

/* SUBTITULO */
.subtitulo {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
    color: #b9b9b9;
}

/* PRODUTOS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
    margin-right: 340px;
}

.cart {
    position: fixed;
    right: 0;
    top: 0;
    width: 320px;
    height: 100vh;
    background: #11111a;
    padding: 20px;
    overflow-y: auto;
    border-left: 2px solid #7f00ff;
    box-sizing: border-box;
}

.card h3 {
    min-height: 40px;
    display: -webkit-box;
    -webkit-line-clamp: 1; /* número máximo de linhas */
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card:hover {
    transform: scale(1.05);
    border: 1px solid #7f00ff;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: #a855f7;
    font-weight: bold;
    margin: 10px 0;
    font-size: 18px;
}

.info-linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0;
}

.quantidade {
    display: flex;
    align-items: center;
    gap: 8px;
}

.quantidade button {
    width: 30px;
    height: 30px;
    padding: 0;
    font-size: 18px;
    border-radius: 6px;
}

.quantidade span {
    min-width: 20px;
    text-align: center;
    font-weight: bold;
}

input {
    width: 60px;
    padding: 6px;
    border-radius: 6px;
    border: none;
    text-align: center;
    background: #1e1e2f;
    color: white;
}

/* BOTÕES ROXOS */
button {
    background: linear-gradient(90deg, #5f0fff, #7f00ff);
    border: none;
    padding: 10px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    font-weight: bold;
}

button:hover {
    opacity: 0.85;
}

/* CARRINHO LATERAL */
.cart {
    position: fixed;
    right: 0;
    top: 0;
    z-index: 1000;
    width: 300px;
    height: 100%;
    background: #11111a;
    padding: 20px;
    overflow-y: auto;
    border-left: 2px solid #7f00ff;
}

.cart h2 {
    text-align: center;
}

.cart-item {
    margin-bottom: 10px;
    border-bottom: 1px solid #2a2a3a;
    padding-bottom: 5px;
}

.total {
    margin-top: 15px;
    font-weight: bold;
    font-size: 18px;
    color: #a855f7;
}

.finalizar {
    margin-top: 15px;
}

/* ================= ONDE COMPRAR ================= */

.onde-comprar {
    position: absolute;
    width: 95%;
    background: #0f0f18;
    border-top: 2px solid #7f00ff;
    padding: 15px 10px;
    text-align: center;
}

.onde-comprar h2 {
    margin: 5px 0 10px;
    font-size: 16px;
}

.links-lojas {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.links-lojas a {
    text-decoration: none;
    background: linear-gradient(90deg, #5f0fff, #7f00ff);
    padding: 12px 20px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.links-lojas a:hover {
    opacity: 0.8;
}

/* ================= RESPONSIVIDADE ================= */

/* TABLET */
@media (max-width: 1024px) {
    .container {
        margin-right: 0;
    }

    .cart {
        position: relative;
        width: 100%;
        height: auto;
        border-left: none;
        border-top: 2px solid #7f00ff;
    }

    .card h3 {
    font-size: 16px;
    min-height: 40px;
    display: -webkit-box;
    -webkit-line-clamp: 1; /* número máximo de linhas */
    -webkit-box-orient: vertical;
    overflow: hidden;
}
}

/* CELULAR */
@media (max-width: 768px) {
    header {
        font-size: 20px;
        padding: 15px;
    }

    .container {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        padding: 15px;
    }

    .card {
        padding: 10px;
    }

    .price {
        font-size: 16px;
    }

    button {
        font-size: 14px;
    }
}

/* TV / TELAS GRANDES */
@media (min-width: 1600px) {
    .container {
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    body {
        font-size: 20px;
    }
}
</style>
</head>
<body>

<header>
    Js 3D Studio
</header>

<div class="subtitulo">
    Catálogo Oficial • Impressão 3D • Colecionáveis
</div>

<div class="container" id="produtos"></div>

<div class="cart">
    <h2>Seu Pedido</h2>
    <div id="cart-items"></div>
    <div class="total">Total: R$ <span id="total">0,00</span></div>
    <button class="finalizar" onclick="finalizarPedido()">Enviar Pedido</button>
</div>

<!-- ================= ONDE COMPRAR ================= -->
<div class="onde-comprar">
    <h2>Onde Comprar</h2>
    <div class="links-lojas">
        <a href="https://shopee.com.br/paulacristin24?categoryId=100639&entryPoint=ShopByPDP&itemId=22699353152" target="_blank">
            🟠 Shopee
        </a>

        <a href="https://www.facebook.com/marketplace/profile/100011864506959/" target="_blank">
            🔵 Marketplace
        </a>

        <a href="https://wa.me/55013997110454?text=Olá,%20tudo%20bem?%20Vim%20pelo%20site%20da%20Js%203D%20Studio." target="_blank">
            🟢 WhatsApp
        </a>
    </div>
</div>

<script src="script.js"></script>
<script>
let carrinho = [];

const container = document.getElementById("produtos");

produtos.forEach(produto => {

    let alturaEspecial = '';

    container.innerHTML += `
        <div class="card">
            <img src="${produto.img}" ${alturaEspecial}>
            <h3>${produto.nome}</h3>
            <div class="info-linha">
    <div class="price">R$ ${produto.preco.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</div>

    <div class="quantidade">
        <button onclick="alterarQtd(${produto.id}, -1)">−</button>
        <span id="qtd-${produto.id}">1</span>
        <button onclick="alterarQtd(${produto.id}, 1)">+</button>
    </div>
</div>

<button onclick="adicionar(${produto.id})">Adicionar</button>
        </div>
    `;
});

function alterarQtd(id, valor) {
    const span = document.getElementById(`qtd-${id}`);
    let atual = parseInt(span.innerText);

    atual += valor;

    if (atual < 1) atual = 1;

    span.innerText = atual;
}

function adicionar(id) {
    const produto = produtos.find(p => p.id === id);
    const quantidade = parseInt(document.getElementById(`qtd-${id}`).innerText);

    const existente = carrinho.find(item => item.id === id);

    if (existente) {
        existente.quantidade += quantidade;
    } else {
        carrinho.push({ ...produto, quantidade });
    }

    atualizarCarrinho();
}

function remover(id) {
    carrinho = carrinho.filter(item => item.id !== id);
    atualizarCarrinho();
}

function atualizarCarrinho() {
    const cartDiv = document.getElementById("cart-items");
    cartDiv.innerHTML = "";
    let total = 0;

    carrinho.forEach(item => {
        const subtotal = item.preco * item.quantidade;
        total += subtotal;

        cartDiv.innerHTML += `
            <div class="cart-item">
                ${item.nome} x${item.quantidade}
                <br>R$ ${subtotal.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}
                <button onclick="remover(${item.id})" 
                        style="margin-top:5px;background:#ff4d4d;">
                    Remover
                </button>
            </div>
        `;
    });

    document.getElementById("total").innerText = 
    total.toLocaleString("pt-BR", { minimumFractionDigits: 2 });
}

function finalizarPedido() {

    if (carrinho.length === 0) {
        alert("Seu carrinho está vazio.");
        return;
    }

    let total = 0;
    let resumo = "Olá, tudo bem? Eu gostaria de fazer esse pedido:%0A%0A";

    carrinho.forEach(item => {
        const subtotal = item.preco * item.quantidade;
        total += subtotal;

        resumo += `• ${item.nome}%0A`;
        resumo += `Quantidade: ${item.quantidade}%0A`;
        resumo += `Subtotal: R$ ${subtotal.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}%0A%0A`;
    });

    resumo += `Valor Total: R$ ${total.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}%0A%0A`;
    resumo += "Aguardo confirmação. Obrigado!";

    window.open(`https://wa.me/55013997110454?text=${resumo}`);
}
</script>

</body>
</html>
