<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
<title>Painel Financeiro - Js 3D Studio</title>

<style>
body {
    font-family: Arial;
    background: #0b0b0f;
    color: white;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
    text-align: center;
}

th {
    background: #1a1a2a;
}

.lucro {
    color: #00ff88;
    font-weight: bold;
}

.prejuizo {
    color: #ff4d4d;
    font-weight: bold;
}
</style>
</head>
<body>

<h1>📊 Painel Financeiro</h1>

<table>
    <thead>
        <tr>
            <th>Produto</th>
            <th>Venda</th>
            <th>Filamento</th>
            <th>Custo</th>
            <th>Tempo</th>
            <th>Watts</th>
            <th>Plus</th>
            <th>Embalagem</th>
            <th>Taxa</th>
            <th>Custo Total</th>
            <th>Lucro</th>
            <th>Margem</th>
        </tr>
    </thead>
    <tbody id="tabela-financeira"></tbody>
</table>

<script src="script.js"></script>
<script>

const tabela = document.getElementById("tabela-financeira");

const potenciaImpressora = 350; // watts
const valorKwh = 0.90; // R$/kWh

const precoFilamentoKg = 120; // R$ por kg
const precoPorGrama = precoFilamentoKg / 1000; // R$/g

// 👉 TAXAS SHOPEE
const taxaShopeePercentual = 0.18; // 18%
const taxaShopeeFixa = 2; // R$ fixo por produto

function calcularTaxa(tipo, preco) {
    if (tipo === 1) {
        // Shopee
        return (preco * taxaShopeePercentual) + taxaShopeeFixa;
    } else if (tipo === 2) {
        // Frete (exemplo fixo ou ajuste depois)
        return 12; 
    } else {
        // Sem taxa
        return 0;
    }
}

function trocarTaxa(elemento, index) {
    let tipoAtual = parseInt(elemento.dataset.tipo);

    // Alterna 1 → 2 → 3 → 1
    tipoAtual = tipoAtual === 3 ? 1 : tipoAtual + 1;

    elemento.dataset.tipo = tipoAtual;

    let texto = "";
    if (tipoAtual === 1) texto = "Shopee";
    if (tipoAtual === 2) texto = "Frete";
    if (tipoAtual === 3) texto = "Sem taxa";

    elemento.innerText = texto;

    atualizarLinha(elemento.parentElement, index, tipoAtual);
}

function atualizarLinha(linha, index, tipoTaxa) {
    const produto = produtosf[index];
    const c = produto.custos;

    const custoFilamento = c.filamentoGramas * precoPorGrama;

    const consumoKwh = (potenciaImpressora / 1000) * c.tempoHoras;
    const custoEnergia = consumoKwh * valorKwh;

    const taxa = calcularTaxa(tipoTaxa, produto.preco);

    const custoTotal = custoFilamento + custoEnergia + c.plus + c.embalagem + taxa;

    const lucro = produto.preco - custoTotal;
    const margem = ((lucro / produto.preco) * 100).toFixed(1);

    let texto = "";
if (tipoTaxa === 1) texto = "Shopee";
if (tipoTaxa === 2) texto = "Frete";
if (tipoTaxa === 3) texto = "Sem taxa";

linha.cells[8].innerHTML = `
    ${texto}<br>
    <small>R$ ${taxa.toFixed(2)}</small>
`;
    linha.cells[9].innerText = `R$ ${custoTotal.toFixed(2)}`;
    linha.cells[10].innerText = `R$ ${lucro.toFixed(2)}`;
    linha.cells[11].innerText = `${margem}%`;

    linha.cells[10].className = lucro >= 0 ? "lucro" : "prejuizo";
}

produtosf.forEach((produto, index) => {
    const c = produto.custos;

    // Cálculo filamento
    const custoFilamento = c.filamentoGramas * precoPorGrama;

    // Energia
    const consumoKwh = (potenciaImpressora / 1000) * c.tempoHoras;
    const custoEnergia = consumoKwh * valorKwh;

    // 👉 Taxa Shopee
    const taxaShopee = calcularTaxa(1, produto.preco);

    // 👉 Custo total (AGORA COM SHOPEE)
    const custoTotal = custoFilamento + custoEnergia + c.plus + c.embalagem + taxaShopee;

    const lucro = produto.preco - custoTotal;
    const margem = ((lucro / produto.preco) * 100).toFixed(1);

    tabela.innerHTML += `
        <tr>
            <td>${produto.nome}</td>
            <td>${formatar(produto.preco)}</td>
            <td>${c.filamentoGramas}g</td>
            <td>${formatar(custoFilamento)}</td>
            <td>⏱ ${c.tempoHoras}h</td>
            <td>${formatar(custoEnergia)}</td>
            <td>${formatar(c.plus)}</td>
            <td>${formatar(c.embalagem)}</td>
            <td onclick="trocarTaxa(this, ${index})" data-tipo="1">Shopee<br><small>R$ ${taxaShopee.toFixed(2)}</small></td>
           <td>${formatar(custoTotal)}</td>
            <td class="${lucro >= 0 ? 'lucro' : 'prejuizo'}">
                ${formatar(lucro)}
            </td>
            <td>${margem}%</td>
        </tr>
    `;
});
</script>

</body>
</html>
